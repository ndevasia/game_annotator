<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .button-large {
      padding: 12px 30px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      width: 200px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>What do you want to do today?</h2>
  <button class="button-large" onclick="startNewSession()">Start a new session</button>
  <button class="button-large" onclick="viewPastSessions()">View past sessions</button>
  <button class="button-large" onclick="openSettings()">Settings</button>
  <button class="button-large" onclick="closeApp()">Close app</button>

  <script>
    const { ipcRenderer } = require('electron');

    function startNewSession() {
      ipcRenderer.send('open-start-session'); // main will load start.html
    }

    function viewPastSessions() {
      ipcRenderer.send('open-past-sessions'); // main will load index.html
    }

    function openSettings() {
      ipcRenderer.send('open-settings');
    }

    function closeApp() {
      ipcRenderer.send('close-app');
    }
  </script>
</body>
</html>
