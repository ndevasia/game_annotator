<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Recent Notes Overlay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    #notes-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 340px;
      max-height: 280px;
      background: rgba(10, 20, 40, 0.9);
      border: 2px solid rgba(0, 255, 255, 0.5);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.25), inset 0 0 10px rgba(0, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 8px;
      backdrop-filter: blur(8px);
    }

    #notes-title {
      font-size: 11px;
      color: #00ffff;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 1px solid rgba(0, 255, 255, 0.25);
      padding-bottom: 6px;
      text-shadow: 0 0 6px rgba(0, 255, 255, 0.5);
      margin-bottom: 2px;
    }

    #notes-list {
      display: flex;
      flex-direction: column-reverse;
      gap: 6px;
      min-height: 0;
      overflow-y: auto;
      max-height: 220px;
    }

    .note-item {
      background: rgba(0, 255, 255, 0.1);
      border-left: 2px solid #00ffff;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      color: #e0e0ff;
      line-height: 1.3;
      word-wrap: break-word;
      transition: all 0.2s ease-in-out;
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .note-item:hover {
      background: rgba(0, 255, 255, 0.18);
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
    }

    .note-timestamp {
      font-size: 10px;
      color: #00ffff;
      opacity: 0.6;
      margin-bottom: 3px;
      display: block;
    }

    .note-content {
      color: #ffffff;
      font-size: 12px;
    }

    .emoji-indicator {
      display: inline-block;
      margin-right: 4px;
      font-size: 13px;
    }

    /* Scrollbar styling */
    #notes-list::-webkit-scrollbar {
      width: 6px;
    }

    #notes-list::-webkit-scrollbar-track {
      background: rgba(0, 255, 255, 0.1);
      border-radius: 3px;
    }

    #notes-list::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 255, 0.4);
      border-radius: 3px;
    }

    #notes-list::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 255, 255, 0.6);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .empty-state {
      text-align: center;
      color: #00ffff;
      opacity: 0.5;
      padding: 16px 8px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="notes-container">
    <div id="notes-title">Recent Notes</div>
    <div id="notes-list">
      <div class="empty-state">No annotations yet...</div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const notesList = document.getElementById('notes-list');
    let recentNotes = [];
    let maxNotesDisplay = 3;
    let videoStartTime = null;

    // Emoji map for emoji reactions
    const emojiMap = {
      '👍': 'Like',
      '❤️': 'Love',
      '😂': 'Haha',
      '😮': 'Wow',
      '😢': 'Sad',
      '😠': 'Angry',
    };

    function isEmoji(text) {
      return Object.keys(emojiMap).includes(text);
    }

    function formatTimestamp(timestamp) {
      if (!videoStartTime) {
        return '0:00';
      }
      
      // Calculate seconds elapsed from video start
      const elapsed = Math.floor((timestamp - videoStartTime) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = Math.floor(elapsed % 60);
      
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function updateNotesList() {
      if (recentNotes.length === 0) {
        notesList.innerHTML = '<div class="empty-state">No annotations yet...</div>';
        return;
      }

      notesList.innerHTML = recentNotes
        .slice(0, maxNotesDisplay)
        .map((note) => {
          const isEmojiNote = isEmoji(note.note);
          const emojiClass = isEmojiNote ? `<span class="emoji-indicator">${note.note}</span>` : '';
          const noteText = isEmojiNote ? emojiMap[note.note] : note.note;
          const timeStr = formatTimestamp(note.timestamp);

          return `
            <div class="note-item">
              <span class="note-timestamp">${timeStr}</span>
              <div class="note-content">${emojiClass}${noteText}</div>
            </div>
          `;
        })
        .join('');
    }

    // Listen for new annotations
    ipcRenderer.on('update-recent-notes', (event, annotation) => {
      // Add to beginning of list
      recentNotes.unshift(annotation);
      updateNotesList();
    });

    // Listen for message count update
    ipcRenderer.on('set-notes-display-count', (event, count) => {
      maxNotesDisplay = Math.max(1, Math.min(10, count || 3));
      updateNotesList();
    });

    // Listen for video start time
    ipcRenderer.on('set-video-start-time', (event, startTime) => {
      videoStartTime = startTime;
      updateNotesList();
    });

    // Listen for session reset
    ipcRenderer.on('clear-recent-notes', () => {
      recentNotes = [];
      updateNotesList();
    });

    updateNotesList();
  </script>
</body>
</html>
