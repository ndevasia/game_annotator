<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .settings-panel {
      width: min(420px, 90vw);
      padding: 24px;
      border: 2px solid rgba(0, 255, 255, 0.55);
      border-radius: 16px;
      background: rgba(7, 10, 28, 0.9);
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.3);
      text-shadow: none;
    }

    .settings-panel h2 {
      margin-top: 0;
      color: #00ffff;
    }

    .settings-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin: 20px 0;
      color: #ffffff;
    }

    .settings-row input {
      margin-top: 4px;
      transform: scale(1.15);
    }

    .settings-copy {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .settings-copy small {
      color: #9fe9ff;
      line-height: 1.45;
    }

    .settings-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 18px;
      color: #ffffff;
    }

    .settings-field select {
      padding: 10px 12px;
      border: 2px solid #00ffff;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.8);
      color: #00ffff;
      font-family: "Orbitron", sans-serif;
    }

    .settings-field select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .settings-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="settings-panel">
    <h2>Settings</h2>
    <div class="settings-row">
      <input id="record-all-displays" type="checkbox">
      <label for="record-all-displays" class="settings-copy">
        <strong>Record both screens</strong>
        <small>When enabled, FFMPEG records the full desktop area across displays. When disabled, it records only the selected display below.</small>
      </label>
    </div>
    <div class="settings-field">
      <label for="display-select"><strong>Monitor to record</strong></label>
      <select id="display-select"></select>
      <small id="display-help">Choose which monitor should be recorded when multi-display capture is off.</small>
    </div>
    <div class="settings-row">
      <input id="local-only-storage" type="checkbox">
      <label for="local-only-storage" class="settings-copy">
        <strong>Use local-only storage</strong>
        <small>When enabled, videos, metadata, and annotations are kept locally and not uploaded to S3 automatically.</small>
      </label>
    </div>
    <div class="settings-row">
      <input id="show-recent-notes-overlay" type="checkbox">
      <label for="show-recent-notes-overlay" class="settings-copy">
        <strong>Show recent notes overlay</strong>
        <small>When enabled, displays the most recent annotations in a transparent overlay during recording.</small>
      </label>
    </div>
    <div class="settings-row">
      <input id="enable-post-game-review" type="checkbox">
      <label for="enable-post-game-review" class="settings-copy">
        <strong>Enable post-game review prompt</strong>
        <small>When enabled, ending a recording opens a review text window instead of the loading spinner so you can add a summary paragraph.</small>
      </label>
    </div>
    <div class="settings-field" style="margin-left: 32px; margin-top: 12px;">
      <label for="recent-notes-count" style="color: #ffffff;"><strong>Number of notes to display:</strong></label>
      <input id="recent-notes-count" type="number" min="1" max="10" style="padding: 8px 10px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace; width: 100px;">
      <small style="color: #9fe9ff; display: block; margin-top: 4px;">How many annotations to show (1-10)</small>
    </div>

    <div class="settings-field" style="margin-top: 24px; border-top: 1px solid rgba(0, 255, 255, 0.3); padding-top: 18px;">
      <strong style="color: #00ffff;">Hotkey Bindings</strong>
      <small style="color: #9fe9ff; margin-bottom: 12px; display: block;">Customize keyboard shortcuts (Ctrl/Cmd+Shift+..., Ctrl/Cmd+1, etc.)</small>
      
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <div style="display: flex; gap: 8px; align-items: center;">
          <label for="hotkey-annotation-window" style="flex: 1; color: #ffffff;">Open Annotation Window:</label>
          <input id="hotkey-annotation-window" type="text" style="flex: 0.6; padding: 6px 10px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace;">
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <label for="hotkey-show-sessions" style="flex: 1; color: #ffffff;">Show Past Sessions:</label>
          <input id="hotkey-show-sessions" type="text" style="flex: 0.6; padding: 6px 10px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace;">
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <label for="hotkey-quit-recording" style="flex: 1; color: #ffffff;">Quit Recording:</label>
          <input id="hotkey-quit-recording" type="text" style="flex: 0.6; padding: 6px 10px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace;">
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <label for="hotkey-toggle-overlay" style="flex: 1; color: #ffffff;">Toggle Overlay:</label>
          <input id="hotkey-toggle-overlay" type="text" style="flex: 0.6; padding: 6px 10px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace;">
        </div>
        
        <div style="margin-top: 8px; border-top: 1px solid rgba(0, 255, 255, 0.2); padding-top: 12px; padding-left: 8px; padding-right: 8px; padding-bottom: 12px;">
          <small style="color: #9fe9ff; display: block; margin-bottom: 12px;">Emoji Reactions:</small>
          <div style="display: flex; flex-direction: column; gap: 10px;">
            <div style="display: flex; gap: 6px; align-items: center;">
              <label for="hotkey-emoji1" style="flex: 1; color: #ffffff; font-size: 0.9em;">👍 Like:</label>
              <input id="hotkey-emoji1" type="text" style="flex: 0.8; padding: 4px 8px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace; font-size: 0.85em;">
            </div>
            <div style="display: flex; gap: 6px; align-items: center;">
              <label for="hotkey-emoji2" style="flex: 1; color: #ffffff; font-size: 0.9em;">❤️ Love:</label>
              <input id="hotkey-emoji2" type="text" style="flex: 0.8; padding: 4px 8px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace; font-size: 0.85em;">
            </div>
            <div style="display: flex; gap: 6px; align-items: center;">
              <label for="hotkey-emoji3" style="flex: 1; color: #ffffff; font-size: 0.9em;">😂 Haha:</label>
              <input id="hotkey-emoji3" type="text" style="flex: 0.8; padding: 4px 8px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace; font-size: 0.85em;">
            </div>
            <div style="display: flex; gap: 6px; align-items: center;">
              <label for="hotkey-emoji4" style="flex: 1; color: #ffffff; font-size: 0.9em;">😮 Wow:</label>
              <input id="hotkey-emoji4" type="text" style="flex: 0.8; padding: 4px 8px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace; font-size: 0.85em;">
            </div>
            <div style="display: flex; gap: 6px; align-items: center;">
              <label for="hotkey-emoji5" style="flex: 1; color: #ffffff; font-size: 0.9em;">😢 Sad:</label>
              <input id="hotkey-emoji5" type="text" style="flex: 0.8; padding: 4px 8px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace; font-size: 0.85em;">
            </div>
            <div style="display: flex; gap: 6px; align-items: center;">
              <label for="hotkey-emoji6" style="flex: 1; color: #ffffff; font-size: 0.9em;">😠 Angry:</label>
              <input id="hotkey-emoji6" type="text" style="flex: 0.8; padding: 4px 8px; border: 1px solid #00ffff; border-radius: 4px; background: rgba(0, 0, 0, 0.8); color: #00ffff; font-family: 'Share Tech Mono', monospace; font-size: 0.85em;">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="settings-actions">
      <button type="button" class="button-small" onclick="closeSettings()">Cancel</button>
      <button type="button" onclick="saveSettings()">Save</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const recordAllDisplaysCheckbox = document.getElementById('record-all-displays');
    const localOnlyStorageCheckbox = document.getElementById('local-only-storage');
    const showRecentNotesOverlayCheckbox = document.getElementById('show-recent-notes-overlay');
    const enablePostGameReviewCheckbox = document.getElementById('enable-post-game-review');
    const recentNotesCountInput = document.getElementById('recent-notes-count');
    const displaySelect = document.getElementById('display-select');
    const displayHelp = document.getElementById('display-help');

    // Hotkey input elements
    const hotkeyInputs = {
      annotationWindow: document.getElementById('hotkey-annotation-window'),
      showSessions: document.getElementById('hotkey-show-sessions'),
      quitRecording: document.getElementById('hotkey-quit-recording'),
      toggleOverlay: document.getElementById('hotkey-toggle-overlay'),
      emoji1: document.getElementById('hotkey-emoji1'),
      emoji2: document.getElementById('hotkey-emoji2'),
      emoji3: document.getElementById('hotkey-emoji3'),
      emoji4: document.getElementById('hotkey-emoji4'),
      emoji5: document.getElementById('hotkey-emoji5'),
      emoji6: document.getElementById('hotkey-emoji6'),
    };

    function renderDisplayOptions(displays, selectedDisplayId) {
      displaySelect.innerHTML = '';

      displays.forEach((display, index) => {
        const option = document.createElement('option');
        option.value = display.id;
        option.textContent = `${display.label || `Display ${index + 1}`} (${display.bounds.width}x${display.bounds.height})${display.internal ? ' - Built-in' : ''}`;
        displaySelect.appendChild(option);
      });

      if (!displays.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'No displays detected';
        displaySelect.appendChild(option);
        displaySelect.disabled = true;
        return;
      }

      const matchingDisplay = displays.find((display) => String(display.id) === String(selectedDisplayId));
      displaySelect.value = matchingDisplay ? matchingDisplay.id : displays[0].id;
    }

    function renderDisplayError(message) {
      displaySelect.innerHTML = '';
      const option = document.createElement('option');
      option.value = '';
      option.textContent = message;
      displaySelect.appendChild(option);
      displaySelect.disabled = true;
    }

    function updateDisplayFieldState() {
      const disabled = recordAllDisplaysCheckbox.checked || !displaySelect.options.length;
      displaySelect.disabled = disabled;
      displayHelp.textContent = recordAllDisplaysCheckbox.checked
        ? 'Disable multi-display capture to choose a specific monitor.'
        : 'Choose which monitor should be recorded when multi-display capture is off.';
    }

    async function loadSettings() {
      try {
        const [settings, displays] = await Promise.all([
          ipcRenderer.invoke('get-settings'),
          ipcRenderer.invoke('get-available-displays'),
        ]);

        recordAllDisplaysCheckbox.checked = settings.recordAllDisplays !== false;
        localOnlyStorageCheckbox.checked = settings.localOnlyStorage === true;
        showRecentNotesOverlayCheckbox.checked = settings.showRecentNotesOverlay !== false;
        enablePostGameReviewCheckbox.checked = settings.enablePostGameReview === true;
        recentNotesCountInput.value = settings.recentNotesCount || 3;
        renderDisplayOptions(displays, settings.selectedDisplayId);
        updateDisplayFieldState();

        // Load hotkey settings
        if (settings.hotkeys) {
          hotkeyInputs.annotationWindow.value = settings.hotkeys.annotationWindow || 'CommandOrControl+Shift+N';
          hotkeyInputs.showSessions.value = settings.hotkeys.showPastSessions || 'CommandOrControl+Shift+O';
          hotkeyInputs.quitRecording.value = settings.hotkeys.quitRecording || 'CommandOrControl+Shift+Q';
          hotkeyInputs.toggleOverlay.value = settings.hotkeys.toggleRecentNotesOverlay || 'CommandOrControl+Shift+P';
          hotkeyInputs.emoji1.value = settings.hotkeys.emoji1 || 'CommandOrControl+1';
          hotkeyInputs.emoji2.value = settings.hotkeys.emoji2 || 'CommandOrControl+2';
          hotkeyInputs.emoji3.value = settings.hotkeys.emoji3 || 'CommandOrControl+3';
          hotkeyInputs.emoji4.value = settings.hotkeys.emoji4 || 'CommandOrControl+4';
          hotkeyInputs.emoji5.value = settings.hotkeys.emoji5 || 'CommandOrControl+5';
          hotkeyInputs.emoji6.value = settings.hotkeys.emoji6 || 'CommandOrControl+6';
        }
      } catch (error) {
        console.error('Failed to load display settings:', error);
        renderDisplayError('Unable to load displays');
        updateDisplayFieldState();
      }
    }

    async function saveSettings() {
      const count = Math.max(1, Math.min(10, parseInt(recentNotesCountInput.value) || 3));
      await ipcRenderer.invoke('save-settings', {
        recordAllDisplays: recordAllDisplaysCheckbox.checked,
        selectedDisplayId: displaySelect.value || null,
        localOnlyStorage: localOnlyStorageCheckbox.checked,
        showRecentNotesOverlay: showRecentNotesOverlayCheckbox.checked,
        enablePostGameReview: enablePostGameReviewCheckbox.checked,
        recentNotesCount: count,
        hotkeys: {
          annotationWindow: hotkeyInputs.annotationWindow.value,
          showPastSessions: hotkeyInputs.showSessions.value,
          quitRecording: hotkeyInputs.quitRecording.value,
          toggleRecentNotesOverlay: hotkeyInputs.toggleOverlay.value,
          emoji1: hotkeyInputs.emoji1.value,
          emoji2: hotkeyInputs.emoji2.value,
          emoji3: hotkeyInputs.emoji3.value,
          emoji4: hotkeyInputs.emoji4.value,
          emoji5: hotkeyInputs.emoji5.value,
          emoji6: hotkeyInputs.emoji6.value,
        },
      });
      ipcRenderer.send('close-settings');
    }

    function closeSettings() {
      ipcRenderer.send('close-settings');
    }

    recordAllDisplaysCheckbox.addEventListener('change', updateDisplayFieldState);

    loadSettings();
  </script>
</body>
</html>
