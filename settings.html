<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .settings-panel {
      width: min(420px, 90vw);
      padding: 24px;
      border: 2px solid rgba(0, 255, 255, 0.55);
      border-radius: 16px;
      background: rgba(7, 10, 28, 0.9);
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.3);
      text-shadow: none;
    }

    .settings-panel h2 {
      margin-top: 0;
      color: #00ffff;
    }

    .settings-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin: 20px 0;
      color: #ffffff;
    }

    .settings-row input {
      margin-top: 4px;
      transform: scale(1.15);
    }

    .settings-copy {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .settings-copy small {
      color: #9fe9ff;
      line-height: 1.45;
    }

    .settings-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 18px;
      color: #ffffff;
    }

    .settings-field select {
      padding: 10px 12px;
      border: 2px solid #00ffff;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.8);
      color: #00ffff;
      font-family: "Orbitron", sans-serif;
    }

    .settings-field select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .settings-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="settings-panel">
    <h2>Settings</h2>
    <div class="settings-row">
      <input id="record-all-displays" type="checkbox">
      <label for="record-all-displays" class="settings-copy">
        <strong>Record both screens</strong>
        <small>When enabled, FFMPEG records the full desktop area across displays. When disabled, it records only the selected display below.</small>
      </label>
    </div>
    <div class="settings-field">
      <label for="display-select"><strong>Monitor to record</strong></label>
      <select id="display-select"></select>
      <small id="display-help">Choose which monitor should be recorded when multi-display capture is off.</small>
    </div>
    <div class="settings-actions">
      <button type="button" class="button-small" onclick="closeSettings()">Cancel</button>
      <button type="button" onclick="saveSettings()">Save</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const recordAllDisplaysCheckbox = document.getElementById('record-all-displays');
    const displaySelect = document.getElementById('display-select');
    const displayHelp = document.getElementById('display-help');

    function renderDisplayOptions(displays, selectedDisplayId) {
      displaySelect.innerHTML = '';

      displays.forEach((display, index) => {
        const option = document.createElement('option');
        option.value = display.id;
        option.textContent = `${display.label || `Display ${index + 1}`} (${display.bounds.width}x${display.bounds.height})${display.internal ? ' - Built-in' : ''}`;
        displaySelect.appendChild(option);
      });

      if (!displays.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'No displays detected';
        displaySelect.appendChild(option);
        displaySelect.disabled = true;
        return;
      }

      const matchingDisplay = displays.find((display) => String(display.id) === String(selectedDisplayId));
      displaySelect.value = matchingDisplay ? matchingDisplay.id : displays[0].id;
    }

    function renderDisplayError(message) {
      displaySelect.innerHTML = '';
      const option = document.createElement('option');
      option.value = '';
      option.textContent = message;
      displaySelect.appendChild(option);
      displaySelect.disabled = true;
    }

    function updateDisplayFieldState() {
      const disabled = recordAllDisplaysCheckbox.checked || !displaySelect.options.length;
      displaySelect.disabled = disabled;
      displayHelp.textContent = recordAllDisplaysCheckbox.checked
        ? 'Disable multi-display capture to choose a specific monitor.'
        : 'Choose which monitor should be recorded when multi-display capture is off.';
    }

    async function loadSettings() {
      try {
        const [settings, displays] = await Promise.all([
          ipcRenderer.invoke('get-settings'),
          ipcRenderer.invoke('get-available-displays'),
        ]);

        recordAllDisplaysCheckbox.checked = settings.recordAllDisplays !== false;
        renderDisplayOptions(displays, settings.selectedDisplayId);
        updateDisplayFieldState();
      } catch (error) {
        console.error('Failed to load display settings:', error);
        renderDisplayError('Unable to load displays');
        updateDisplayFieldState();
      }
    }

    async function saveSettings() {
      await ipcRenderer.invoke('save-settings', {
        recordAllDisplays: recordAllDisplaysCheckbox.checked,
        selectedDisplayId: displaySelect.value || null,
      });
      ipcRenderer.send('close-settings');
    }

    function closeSettings() {
      ipcRenderer.send('close-settings');
    }

    recordAllDisplaysCheckbox.addEventListener('change', updateDisplayFieldState);

    loadSettings();
  </script>
</body>
</html>
