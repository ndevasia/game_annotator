<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Video + Annotations</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: linear-gradient(180deg, #0d0221, #1a1a40, #2e0249);
      color: #eee;
      min-height: 100vh;
    }

    h2, h3 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.4em;
      font-weight: normal;
      color: #00ffff;
      text-shadow: 0 0 5px #00ffff, 0 0 10px #0088ff;
      margin-bottom: 10px;
    }

    .session {
      margin-bottom: 40px;
    }

    video {
      width: 100%;
      max-width: 700px;
      margin-bottom: 1em;
      border: 2px solid #00ffff;
      border-radius: 6px;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }

    .annotations {
      margin-top: 10px;
      max-width: 700px;
      background: rgba(20, 20, 40, 0.8);
      border: 1px solid rgba(255, 0, 255, 0.3);
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 0 15px rgba(255,0,255,0.2);
    }

    .annotation {
      padding: 6px 12px;
      margin-bottom: 6px;
      border-left: 4px solid #ff00ff;
      background: linear-gradient(90deg, rgba(255,0,255,0.08), rgba(0,255,255,0.08));
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      line-height: 1.4;
      justify-content: space-between;
    }

    .annotation:hover {
      background: linear-gradient(90deg, rgba(255,0,255,0.15), rgba(0,255,255,0.15));
      transform: scale(1.02);
    }

    .annotation-content {
      flex: 1;
    }

    .loader {
      border: 6px solid rgba(0, 255, 255, 0.1);
      border-top: 6px solid #00ffff;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
      display: none;
      box-shadow: 0 0 12px #00ffff, 0 0 24px #00ffff;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .annotation button {
      display: none;
      margin-left: 12px;
      background: transparent;
      border: none;
      color: #ff5555;
      font-size: 1.1em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, color 0.2s;
      opacity: 0;
    }

    .annotation:hover button {
      display: inline;
      opacity: 1;
    }

    .neon-heading {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5em;
      font-weight: bold;
      text-transform: uppercase;
      text-align: center;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 0 5px rgba(255,0,255,0.7),
        0 0 12px rgba(0,255,255,0.5);
      -webkit-text-stroke: 1px rgba(0,0,0,0.6);
      animation: neonPulse 1.8s ease-in-out infinite alternate;
    }

    @keyframes neonPulse {
      from {
        text-shadow:
          0 0 5px #ff00ff,
          0 0 10px #ff00ff,
          0 0 20px #00ffff,
          0 0 30px #00ffff,
          0 0 40px #ff00ff;
      }
      to {
        text-shadow:
          0 0 10px #ff00ff,
          0 0 20px #ff00ff,
          0 0 30px #00ffff,
          0 0 40px #00ffff,
          0 0 50px #ff00ff;
      }
    }

    .local-session-title {
      color: #ffe066;
      text-shadow: 0 0 6px rgba(255, 224, 102, 0.6);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .status-badge.live {
      color: #ff7b7b;
      border-color: rgba(255, 80, 80, 0.7);
      box-shadow: 0 0 10px rgba(255, 80, 80, 0.35);
    }

    .status-badge.local {
      color: #ffe066;
      border-color: rgba(255, 224, 102, 0.7);
      box-shadow: 0 0 8px rgba(255, 224, 102, 0.3);
    }

    .status-badge.saved {
      color: #7dffcf;
      border-color: rgba(125, 255, 207, 0.7);
      box-shadow: 0 0 8px rgba(125, 255, 207, 0.25);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4d4d;
      box-shadow: 0 0 10px #ff4d4d;
      animation: livePulse 1.2s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 0.45; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .video-placeholder {
      width: 100%;
      max-width: 700px;
      margin-bottom: 1em;
      border: 2px dashed rgba(0, 255, 255, 0.7);
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.08), rgba(255, 0, 255, 0.08));
      box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.12);
      padding: 16px;
    }

    .video-placeholder h3 {
      margin: 0 0 8px 0;
      font-size: 1.1rem;
    }

    .video-placeholder p {
      margin: 0;
      font-size: 0.9rem;
      color: #cde6f5;
    }

    .session-footer {
      max-width: 700px;
      margin-top: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      color: #7dffcf;
      opacity: 0.9;
    }

    .video-buttons-container {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 1em;
    }

    .video-wrapper {
      flex: 0 0 auto;
      max-width: 700px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: fit-content;
    }

    .button-group button {
      white-space: nowrap;
    }

    .annotation.new-note {
      animation: revealNote 0.35s ease-out;
    }

    @keyframes revealNote {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .annotation.no-video {
      cursor: default;
    }

    .annotation.no-video:hover {
      transform: none;
    }
  </style>
</head>
<body>
  <h1 class="neon-heading">Annotated Sessions</h1>
  <div id="loader" class="loader"></div>
  <div id="sessions"></div>

  <button id="load-more" style="display:none; margin: 20px auto; padding: 10px 20px;
    background: #00ffff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">
    Load More Sessions
  </button>

  <button id="back-home" style="
    margin: 20px auto;
    display: block;
    padding: 10px 20px;
    border: 1px solid #ff00ff;
    border-radius: 6px;
    background: rgba(40,0,60,0.6);
    color: #ff00ff;
    font-family: 'Share Tech Mono', monospace;
    cursor: pointer;
    text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 15px #ff00ff;
    transition: all 0.2s ease-in-out;
  ">
    Back to Home Screen
  </button>

  <script>
    const fs = require('fs');
    const { ipcRenderer } = require('electron');
    const AWSManager = require('./backend/aws.js');

    const sessionContainer = document.getElementById('sessions');
    const loadMoreBtn = document.getElementById('load-more');
    const loader = document.getElementById('loader');
    const backBtn = document.getElementById('back-home');

    let client;
    let allSessions = [];
    let visibleCount = 0;
    let activeUsername = null;
    let liveRefreshTimer = null;
    const liveSessionViews = new Map();
    const PAGE_SIZE = 5;
    const LIVE_REFRESH_INTERVAL_MS = 3000;

    backBtn.addEventListener('mouseenter', () => {
      backBtn.style.background = 'rgba(255,0,255,0.2)';
      backBtn.style.color = '#00ffff';
      backBtn.style.textShadow = '0 0 8px #00ffff, 0 0 16px #00ffff';
    });

    backBtn.addEventListener('mouseleave', () => {
      backBtn.style.background = 'rgba(40,0,60,0.6)';
      backBtn.style.color = '#ff00ff';
      backBtn.style.textShadow = '0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 15px #ff00ff';
    });

    backBtn.addEventListener('click', () => {
      ipcRenderer.send('open-home');
    });

    ipcRenderer.on('session-data', async (event, username) => {
      sessionContainer.innerHTML = '';
      loadMoreBtn.style.display = 'none';
      loader.style.display = 'block';
      if (liveRefreshTimer) {
        clearInterval(liveRefreshTimer);
        liveRefreshTimer = null;
      }
      liveSessionViews.clear();

      if (!username) {
        loader.style.display = 'none';
        sessionContainer.innerHTML = '<p>No username found in session data.</p>';
        return;
      }

      activeUsername = username;
      client = new AWSManager(username);

      try {
        await client.init();
        const [s3Sessions, localSessions] = await Promise.all([
          client.loadSessionsFromS3(username),
          ipcRenderer.invoke('get-local-sessions', username),
        ]);

        const normalizedS3Sessions = s3Sessions.map((session) => ({
          ...session,
          source: 's3',
          isLocalOnly: false,
        }));

        const normalizedLocalSessions = localSessions.map((session) => ({
          ...session,
          source: 'local',
          isLocalOnly: true,
        }));

        // Sort by fileTimestamp descending (newest first).
        // Format: "YYYY-MM-DD HH-MM-SS-ms" sorts correctly lexicographically.
        allSessions = [...normalizedLocalSessions, ...normalizedS3Sessions].sort((a, b) => {
          const fileA = a.fileTimestamp || '';
          const fileB = b.fileTimestamp || '';
          return fileB.localeCompare(fileA);
        });

        loader.style.display = 'none';

        if (allSessions.length === 0) {
          sessionContainer.innerHTML = '<p>No sessions found.</p>';
          return;
        }

        visibleCount = 0;
        await renderNextPage();
      } catch (err) {
        console.error('Error loading sessions:', err);
        loader.style.display = 'none';
        sessionContainer.innerHTML = '<p>Error loading sessions.</p>';
      }
    });

    async function renderNextPage() {
      const next = allSessions.slice(visibleCount, visibleCount + PAGE_SIZE);
      for (const session of next) {
        await createSession(session);
      }
      visibleCount += next.length;

      loadMoreBtn.style.display = visibleCount < allSessions.length ? 'block' : 'none';
      ensureLiveRefreshTimer();
    }

    loadMoreBtn.addEventListener('click', renderNextPage);

    function styleActionButton(button, primaryColor, isSmall = false) {
      button.style.marginLeft = '0';
      button.style.padding = isSmall ? '5px 12px' : '6px 14px';
      button.style.fontSize = isSmall ? '0.8em' : '1em';
      button.style.border = `1px solid ${primaryColor}`;
      button.style.borderRadius = '3px';
      button.style.background = 'rgba(40,0,60,0.6)';
      button.style.color = primaryColor;
      button.style.fontFamily = "'Share Tech Mono', monospace";
      button.style.cursor = 'pointer';
      button.style.textShadow = `0 0 5px ${primaryColor}, 0 0 10px ${primaryColor}`;
      button.style.transition = 'all 0.2s ease-in-out';

      button.onmouseenter = () => {
        button.style.background = 'rgba(255,0,255,0.2)';
        button.style.color = '#00ffff';
        button.style.textShadow = '0 0 8px #00ffff, 0 0 16px #00ffff';
      };

      button.onmouseleave = () => {
        button.style.background = 'rgba(40,0,60,0.6)';
        button.style.color = primaryColor;
        button.style.textShadow = `0 0 5px ${primaryColor}, 0 0 10px ${primaryColor}`;
      };
    }

    function loadAnnotations(session) {
      if (session.source === 'local') {
        if (!session.annotationPath || !fs.existsSync(session.annotationPath)) return [];
        try {
          const raw = fs.readFileSync(session.annotationPath, 'utf8');
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      if (!session.annotationUrl) return [];
      return fetch(session.annotationUrl)
        .then((res) => res.json())
        .catch(() => []);
    }

    function deleteLocalAnnotation(session, targetTimestamp) {
      if (!session.annotationPath || !fs.existsSync(session.annotationPath)) {
        throw new Error('No local annotation file found.');
      }

      const raw = fs.readFileSync(session.annotationPath, 'utf8');
      const annotations = JSON.parse(raw);
      const filtered = annotations.filter((a) => a.timestamp !== targetTimestamp);
      fs.writeFileSync(session.annotationPath, JSON.stringify(filtered, null, 2), 'utf8');
    }

    function getSessionStatus(session) {
      if (session.source === 'local' && session.isInProgress) {
        return { label: 'Live', className: 'live', showDot: true };
      }
      if (session.source === 'local') {
        return { label: 'Local', className: 'local', showDot: false };
      }
      return { label: 'Cloud', className: 'saved', showDot: false };
    }

    function createStatusBadge(session) {
      const state = getSessionStatus(session);
      const badge = document.createElement('span');
      badge.className = `status-badge ${state.className}`;
      if (state.showDot) {
        const dot = document.createElement('span');
        dot.className = 'live-dot';
        badge.appendChild(dot);
      }
      const text = document.createElement('span');
      text.textContent = state.label;
      badge.appendChild(text);
      return badge;
    }

    function createVideoPlaceholder(isInProgress) {
      const wrapper = document.createElement('div');
      wrapper.className = 'video-placeholder';
      wrapper.innerHTML = isInProgress
        ? '<h3>Session in progress</h3><p>Video will be available after this session ends. Notes will continue to update live.</p>'
        : '<h3>Video unavailable</h3><p>This local session currently has notes, but no playable video file.</p>';
      return wrapper;
    }

    function formatOffset(timestamp, videoStart) {
      const offset = (timestamp - videoStart) / 1000;
      const safeOffset = Number.isFinite(offset) && offset >= 0 ? offset : 0;
      const minutes = Math.floor(safeOffset / 60);
      const seconds = Math.floor(safeOffset % 60);
      return {
        safeOffset,
        timeLabel: `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`,
      };
    }

    function renderAnnotations(session, annotationDiv, loadedAnnotations, mediaEl, knownTimestamps, highlightNew = false) {
      if (!loadedAnnotations.length) {
        annotationDiv.innerHTML = session.isInProgress
          ? '<strong>No notes yet in this live session</strong>'
          : '<strong>No annotations were added</strong>';
        return;
      }

      annotationDiv.innerHTML = '';
      const sorted = [...loadedAnnotations].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
      const videoStart = session.videoStartTimestamp;

      sorted.forEach((a) => {
        const { safeOffset, timeLabel } = formatOffset(a.timestamp, videoStart);
        const note = document.createElement('div');
        const canSeek = Boolean(mediaEl && session.hasVideo !== false);
        note.className = `annotation ${canSeek ? '' : 'no-video'}`.trim();
        if (highlightNew && !knownTimestamps.has(a.timestamp)) {
          note.classList.add('new-note');
        }
        note.innerHTML = `<strong>${timeLabel}</strong>: ${a.note}`;

        if (canSeek) {
          note.onclick = () => {
            mediaEl.currentTime = safeOffset;
            mediaEl.play();
          };
        }

        const deleteBtn = document.createElement('button');
        deleteBtn.innerHTML = 'x';
        deleteBtn.onclick = async (e) => {
          e.stopPropagation();
          try {
            if (session.source === 'local') {
              deleteLocalAnnotation(session, a.timestamp);
            } else {
              await client.deleteAnnotation(session.annotationUrl, a.timestamp);
            }
            note.remove();
            knownTimestamps.delete(a.timestamp);
          } catch (err) {
            console.error('Failed to delete annotation:', err);
            alert(`Error deleting annotation: ${err}`);
          }
        };

        note.appendChild(deleteBtn);
        annotationDiv.appendChild(note);
        knownTimestamps.add(a.timestamp);
      });
    }

    function updateLiveStatus(statusDiv, text) {
      if (!statusDiv) return;
      statusDiv.textContent = text;
    }

    function ensureLiveRefreshTimer() {
      if (liveRefreshTimer || liveSessionViews.size === 0) return;
      liveRefreshTimer = setInterval(refreshLiveSessions, LIVE_REFRESH_INTERVAL_MS);
    }

    async function refreshLiveSessions() {
      if (liveSessionViews.size === 0) {
        if (liveRefreshTimer) {
          clearInterval(liveRefreshTimer);
          liveRefreshTimer = null;
        }
        return;
      }

      for (const [key, view] of liveSessionViews.entries()) {
        const { session, annotationDiv, statusDiv, mediaEl, knownTimestamps } = view;
        try {
          const latestAnnotations = await Promise.resolve(loadAnnotations(session));
          renderAnnotations(session, annotationDiv, latestAnnotations, mediaEl, knownTimestamps, true);
          updateLiveStatus(statusDiv, `Updated ${new Date().toLocaleTimeString()}`);
        } catch (err) {
          console.warn(`Failed to refresh notes for ${key}:`, err);
          updateLiveStatus(statusDiv, 'Reconnecting...');
        }
      }
    }

    async function createSession(session) {
      const sessionDiv = document.createElement('div');
      sessionDiv.className = 'session';

      const heading = document.createElement('h2');
      const date = new Date(session.videoStartTimestamp);
      const options = {
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: true, month: 'numeric', day: 'numeric', year: '2-digit'
      };
      const headingLabel = document.createElement('span');
      headingLabel.textContent = `${session.title} - ${date.toLocaleTimeString(undefined, options)}`;
      if (session.isLocalOnly) {
        headingLabel.className = 'local-session-title';
      }
      heading.appendChild(headingLabel);
      heading.appendChild(createStatusBadge(session));

      // Create button container early so buttons can be added to it
      const buttonContainer = document.createElement('div');
      buttonContainer.className = 'button-group';

      const deleteSessionBtn = document.createElement('button');
      deleteSessionBtn.textContent = 'Delete';
      styleActionButton(deleteSessionBtn, '#ff00ff', true);

      deleteSessionBtn.onclick = async () => {
        if (!confirm('Are you sure you want to delete this entire session (video, metadata, and annotations)?')) return;
        try {
          if (session.source === 'local') {
            await ipcRenderer.invoke('delete-local-session', {
              username: session.username || activeUsername,
              fileTimestamp: session.fileTimestamp,
            });
          } else {
            await client.deleteSession(session.videoUrl);
          }
          sessionDiv.remove();
        } catch (err) {
          console.error('Failed to delete session:', err);
          alert('Error deleting session.');
        }
      };

      if (!(session.source === 'local' && session.isInProgress)) {
        buttonContainer.appendChild(deleteSessionBtn);
      }

      if (session.source === 'local' && !session.isInProgress) {
        const downloadBtn = document.createElement('button');
        downloadBtn.textContent = 'Download';
        styleActionButton(downloadBtn, '#00ff00', true);

        downloadBtn.onclick = async () => {
          downloadBtn.disabled = true;
          downloadBtn.textContent = 'Downloading...';
          try {
            await ipcRenderer.invoke('download-local-session', {
              username: session.username || activeUsername,
              fileTimestamp: session.fileTimestamp,
            });
            downloadBtn.textContent = 'Downloaded!';
            setTimeout(() => {
              downloadBtn.disabled = false;
              downloadBtn.textContent = 'Download';
            }, 2000);
          } catch (err) {
            console.error('Failed to download local session:', err);
            alert('Error downloading session files.');
            downloadBtn.disabled = false;
            downloadBtn.textContent = 'Download';
          }
        };

        buttonContainer.appendChild(downloadBtn);
      }

      if (session.source !== 'local') {
        const downloadS3Btn = document.createElement('button');
        downloadS3Btn.textContent = 'Download';
        styleActionButton(downloadS3Btn, '#00ff00', true);

        downloadS3Btn.onclick = async () => {
          downloadS3Btn.disabled = true;
          downloadS3Btn.textContent = 'Downloading...';
          try {
            await ipcRenderer.invoke('download-s3-session', {
              username: session.username,
              fileTimestamp: session.fileTimestamp,
            });
            downloadS3Btn.textContent = 'Downloaded!';
            setTimeout(() => {
              downloadS3Btn.disabled = false;
              downloadS3Btn.textContent = 'Download';
            }, 2000);
          } catch (err) {
            console.error('Failed to download S3 session:', err);
            alert('Error downloading session files.');
            downloadS3Btn.disabled = false;
            downloadS3Btn.textContent = 'Download';
          }
        };

        buttonContainer.appendChild(downloadS3Btn);
      }

      if (session.source === 'local' && !session.isInProgress) {
        const uploadBtn = document.createElement('button');
        uploadBtn.textContent = 'Upload';
        styleActionButton(uploadBtn, '#ffe066', true);

        uploadBtn.onclick = async () => {
          uploadBtn.disabled = true;
          uploadBtn.textContent = 'Uploading...';
          try {
            await ipcRenderer.invoke('upload-local-session', {
              username: session.username || activeUsername,
              fileTimestamp: session.fileTimestamp,
            });
            sessionDiv.remove();
          } catch (err) {
            console.error('Failed to upload local session:', err);
            alert('Error uploading local session to S3.');
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Upload';
          }
        };

        buttonContainer.appendChild(uploadBtn);
      }

      const hasVideo = session.hasVideo !== false && Boolean(session.videoUrl);
      let mediaEl = null;
      if (hasVideo) {
        mediaEl = document.createElement('video');
        mediaEl.controls = true;
        mediaEl.src = session.videoUrl;
      } else {
        mediaEl = createVideoPlaceholder(Boolean(session.isInProgress));
      }

      const videoWrapper = document.createElement('div');
      videoWrapper.className = 'video-wrapper';
      videoWrapper.appendChild(mediaEl);

      const videoButtonsContainer = document.createElement('div');
      videoButtonsContainer.className = 'video-buttons-container';
      videoButtonsContainer.appendChild(videoWrapper);
      videoButtonsContainer.appendChild(buttonContainer);

      const annotationDiv = document.createElement('div');
      annotationDiv.className = 'annotations';
      annotationDiv.innerHTML = '<em>Loading annotations...</em>';
      const knownTimestamps = new Set();

      const loadedAnnotations = await Promise.resolve(loadAnnotations(session));

      renderAnnotations(session, annotationDiv, loadedAnnotations, hasVideo ? mediaEl : null, knownTimestamps, false);

      let footerDiv = null;
      if (session.source === 'local' && session.isInProgress) {
        footerDiv = document.createElement('div');
        footerDiv.className = 'session-footer';
        footerDiv.textContent = 'Waiting for live updates...';
        liveSessionViews.set(session.fileTimestamp, {
          session,
          annotationDiv,
          statusDiv: footerDiv,
          mediaEl: hasVideo ? mediaEl : null,
          knownTimestamps,
        });
      }

      sessionDiv.appendChild(heading);
      sessionDiv.appendChild(videoButtonsContainer);
      sessionDiv.appendChild(annotationDiv);
      if (footerDiv) {
        sessionDiv.appendChild(footerDiv);
      }
      sessionContainer.appendChild(sessionDiv);
    }

    window.addEventListener('beforeunload', () => {
      if (liveRefreshTimer) {
        clearInterval(liveRefreshTimer);
        liveRefreshTimer = null;
      }
    });
  </script>
</body>
</html>
